<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal: creme → amarelo suave → verde suave -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F5E7"/>
      <stop offset="25%" style="stop-color:#F8F5E7"/>
      <stop offset="40%" style="stop-color:#FBF0D4"/>
      <stop offset="55%" style="stop-color:#F5E8C8"/>
      <stop offset="70%" style="stop-color:#E8E8D0"/>
      <stop offset="85%" style="stop-color:#E0EDE4"/>
      <stop offset="100%" style="stop-color:#D4E5DA"/>
    </linearGradient>
    <!-- Gradiente radial para suavizar cantos -->
    <radialGradient id="radialSoft" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#FDF9ED;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="radialGreen" cx="80%" cy="80%" r="60%">
      <stop offset="0%" style="stop-color:#21773D;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="radialYellow" cx="20%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#FDCB10;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Base em gradiente -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  <!-- Overlays radiais suaves -->
  <rect width="1920" height="1080" fill="url(#radialSoft)"/>
  <rect width="1920" height="1080" fill="url(#radialGreen)"/>
  <rect width="1920" height="1080" fill="url(#radialYellow)"/>
</svg>
